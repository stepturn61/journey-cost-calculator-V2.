name: Update UK Fuel Prices V2

on:
  schedule:
    # Runs at 6:00 PM UTC (6:00 PM UK winter time, 7:00 PM BST) to ensure the 4PM data is live
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install Pandas
        run: pip install pandas

      - name: Run script to fetch and clean CSV
        run: python scripts/fetch_prices.py
        
      - name: Commit and push if prices.json changed
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git diff --quiet prices.json || git commit -am "Update fuel prices (automated V2)"
          git push
